# Fly.io app config — rharuowallet API
# Docs: https://fly.io/docs/reference/configuration/

app = "rharuowallet-api"
primary_region = "gru"  # São Paulo (GRU)

[build]
  # Dockerfile está na raiz do repo; rode `flyctl deploy` a partir da raiz

[env]
  PORT       = "3001"
  NODE_ENV   = "production"
  LOG_LEVEL  = "info"
  CORS_ORIGIN = "https://rharuowallet.vercel.app"

# Secrets sensíveis devem ser configurados via CLI:
#   flyctl secrets set JWT_SECRET=... DATABASE_URL=... UPSTASH_REDIS_URL=... UPSTASH_REDIS_TOKEN=... --app rharuowallet-api

[http_service]
  internal_port       = 3001
  force_https         = true
  auto_stop_machines  = true   # economiza recursos no plano free
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  interval   = "30s"
  timeout    = "5s"
  grace_period = "10s"
  method     = "GET"
  path       = "/health"

[[vm]]
  cpu_kind   = "shared"
  cpus       = 1
  memory_mb  = 256
