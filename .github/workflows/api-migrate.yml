name: API Migrate

on:
  workflow_dispatch:

concurrency:
  group: api-prod-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on:
      - self-hosted
      - linux
      - x64
      - prod-migrations
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps (api workspace)
        run: npm ci --workspace=services/api

      - name: Prisma migrate deploy
        working-directory: services/api
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL_POOLER }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: npm run db:migrate:deploy