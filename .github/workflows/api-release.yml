name: API Release

on:
  workflow_run:
    workflows: ["API Migrate"]
    types: [completed]
  pull_request:
    branches: [main]
    paths:
      - "services/api/**"
      - "infra/aws/ec2/docker-compose.api.yml"
      - "Dockerfile"
      - ".github/workflows/api-migrate.yml"
      - ".github/workflows/api-release.yml"
  workflow_dispatch:

concurrency:
  group: api-prod-release
  cancel-in-progress: false

jobs:
  release_pr_gate:
    name: Release
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Release gate (PR)
        run: echo "Release to EC2 is executed only after merge to main and successful API Migrate."

  deploy_ec2:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on:
      - self-hosted
      - linux
      - x64
      - ec2-deploy
    timeout-minutes: 20
    steps:
      - name: Deploy API locally on EC2 runner
        run: |
          set -e
          cd /opt/rharuowallet
          COMPOSE_FILE="infra/aws/ec2/docker-compose.api.yml"

          echo "[deploy] Event: $GITHUB_EVENT_NAME"
          echo "[deploy] Triggered by: $GITHUB_ACTOR"
          echo "[deploy] Workflow run id: $GITHUB_RUN_ID"

          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main

          DEPLOYED_SHA="$(git rev-parse HEAD)"
          DEPLOYED_SHA_SHORT="$(git rev-parse --short HEAD)"
          DEPLOYED_SUBJECT="$(git log -1 --pretty=%s)"
          DEPLOYED_AT_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "[deploy] Branch: main"
          echo "[deploy] Commit: $DEPLOYED_SHA_SHORT ($DEPLOYED_SHA)"
          echo "[deploy] Message: $DEPLOYED_SUBJECT"
          echo "[deploy] Timestamp (UTC): $DEPLOYED_AT_UTC"

          printf '%s | branch=main | sha=%s | actor=%s | run=%s | message=%s\n' \
            "$DEPLOYED_AT_UTC" "$DEPLOYED_SHA" "$GITHUB_ACTOR" "$GITHUB_RUN_ID" "$DEPLOYED_SUBJECT" \
            >> /opt/rharuowallet/.deploy-history.log

          docker compose -f "$COMPOSE_FILE" up --build -d --remove-orphans

          # Give the API time to boot and report diagnostics if healthcheck fails.
          if ! curl -fsS --retry 20 --retry-delay 2 --retry-all-errors http://127.0.0.1:8080/health; then
            docker compose -f "$COMPOSE_FILE" ps || true
            docker compose -f "$COMPOSE_FILE" logs --tail=200 || true
            exit 1
          fi