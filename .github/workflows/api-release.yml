name: API Release

on:
  workflow_run:
    workflows: ["API Migrate"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: api-prod-release
  cancel-in-progress: false

jobs:
  deploy_ec2:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on:
      - self-hosted
      - linux
      - x64
      - ec2-deploy
    timeout-minutes: 20
    steps:
      - name: Deploy API locally on EC2 runner
        run: |
          set -e
          cd /opt/rharuowallet
          COMPOSE_FILE="infra/aws/ec2/docker-compose.api.yml"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
          docker compose -f "$COMPOSE_FILE" up --build -d --remove-orphans

          # Give the API time to boot and report diagnostics if healthcheck fails.
          if ! curl -fsS --retry 20 --retry-delay 2 --retry-all-errors http://127.0.0.1:8080/health; then
            docker compose -f "$COMPOSE_FILE" ps || true
            docker compose -f "$COMPOSE_FILE" logs --tail=200 || true
            exit 1
          fi