name: API Release

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - "infra/aws/ec2/docker-compose.api.yml"
      - "Dockerfile"
      - ".github/workflows/api-release.yml"
  workflow_dispatch:

concurrency:
  group: api-prod-release
  cancel-in-progress: false

jobs:
  deploy_ec2:
    runs-on:
      - self-hosted
      - linux
      - x64
      - ec2-deploy
    timeout-minutes: 20
    steps:
      - name: Deploy API locally on EC2 runner
        run: |
          set -e
          cd /opt/rharuowallet
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
          docker compose -f infra/aws/ec2/docker-compose.api.yml up --build -d --remove-orphans
          curl -fsS http://127.0.0.1:8080/health