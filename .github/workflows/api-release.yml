name: API Release

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - "infra/aws/ec2/docker-compose.api.yml"
      - "Dockerfile"
      - ".github/workflows/api-release.yml"
  workflow_dispatch:

concurrency:
  group: api-prod-release
  cancel-in-progress: false

jobs:
  deploy_ec2:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Deploy API on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        run: |
          ssh -i ~/.ssh/ec2_key -p "${EC2_PORT}" -o StrictHostKeyChecking=accept-new "${EC2_USER}@${EC2_HOST}" '
            set -e
            cd /opt/rharuowallet
            git pull --ff-only
            docker compose -f infra/aws/ec2/docker-compose.api.yml up --build -d --remove-orphans
            curl -fsS http://127.0.0.1:8080/health
          '