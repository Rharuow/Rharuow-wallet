# fly.toml app configuration file generated for rharuow-wallet on 2026-03-12T03:11:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rharuow-wallet'
primary_region = 'ams'

[build]

[env]
  PORT       = "8080"
  NODE_ENV   = "production"
  LOG_LEVEL  = "info"
  CORS_ORIGIN = "https://rharuow-wallet-web.vercel.app"

# Secrets sensíveis devem ser configurados via CLI:
#   flyctl secrets set JWT_SECRET=... DATABASE_URL=... UPSTASH_REDIS_URL=... UPSTASH_REDIS_TOKEN=... --app rharuowallet-api

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
